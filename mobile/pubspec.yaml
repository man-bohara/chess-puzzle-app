name: chess_puzzle_app
description: "Chess puzzle mobile app — solve a bundled library of puzzles offline."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.1

  # Chess
  # `bishop` is the engine (FEN, move legality, game state).
  # `squares` is the board widget; it consumes bishop's SquaresState directly.
  bishop: ^1.4.4
  squares: ^1.2.1
  # Bridge: extension methods on bishop.Game producing squares' SquaresState.
  square_bishop: ^0.3.0

  # Confetti burst on puzzle solve.
  confetti: ^0.8.0
  audioplayers: ^6.6.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/puzzles.json
    - assets/sounds/
